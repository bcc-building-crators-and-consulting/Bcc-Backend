# ??? Application ???????????????????????????
spring.application.name=Building-Creatoers-And-Consulting

# ??? Database ??????????????????????????????
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bcc_db}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA / Hibernate ???????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ??? Swagger ???????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method

# ??? Email ?????????????????????????????????
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.contact.notification-email=${NOTIFICATION_EMAIL}

# ??? JWT ???????????????????????????????????
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${ACCESS_TOKEN_EXPIRY:86400000}
app.jwt.refresh-token-expiration-ms=${REFRESH_TOKEN_EXPIRY:604800000}

# ??? File Uploads ??????????????????????????
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${UPLOAD_DIR}
app.upload.gallery-dir=${app.upload.dir}/images/gallery
app.upload.team-dir=${app.upload.dir}/images/members
app.upload.resume-dir=${app.upload.dir}/resumes
app.upload.project-dir=${app.upload.dir}/images/projects
app.upload.blog-dir=${app.upload.dir}/images/blogs

# ??? CORS ??????????????????????????????????
app.cors.allowed-origins=${CORS_ORIGINS}


# ??? Logging ???????????????????????????????
logging.level.org.springframework=WARN
logging.level.com.bcc=INFO